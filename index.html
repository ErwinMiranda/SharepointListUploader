<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>SharePoint CRUD Web App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="dashboard">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="logo">
          <h2>Lufthansa Technik Philippines</h2>
          <div class="accent-line"></div>
        </div>

        <nav class="nav">
          <a href="#" class="nav-item active">
            <span class="nav-icon">📊</span>
            <span class="nav-text">Dashboard</span>
          </a>
          <a href="#" class="nav-item">
            <span class="nav-icon">📋</span>
            <span class="nav-text">Tasks</span>
          </a>
          <a href="#" class="nav-item">
            <span class="nav-icon">📈</span>
            <span class="nav-text">Reports</span>
          </a>
          <a href="#" class="nav-item">
            <span class="nav-icon">⚙️</span>
            <span class="nav-text">Settings</span>
          </a>
        </nav>
      </aside>

      <!-- MAIN AREA -->
      <div class="main">
        <!-- HEADER -->
        <header class="topbar">
          <div class="topbar-left">
            <button id="sidebarToggle" class="toggle-btn">☰</button>
            <h1>Operations Dashboard</h1>
          </div>
          <div class="user">Admin</div>
        </header>

        <!-- KPI CARDS -->
        <section class="kpi-section">
          <div class="kpi-card">
            <h3>Total Tasks</h3>
            <p id="totalCount">0</p>
          </div>

          <div class="kpi-card">
            <h3>Open</h3>
            <p id="openCount">0</p>
          </div>

          <div class="kpi-card">
            <h3>In Progress</h3>
            <p id="progressCount">0</p>
          </div>

          <div class="kpi-card">
            <h3>Closed</h3>
            <p id="closedCount">0</p>
          </div>
        </section>

        <!-- FORM CARD -->
        <div class="card form-card">
          <div class="form-grid">
            <input id="title" placeholder="Task Title" />

            <select id="status">
              <option value="">Select Status</option>
              <option value="Open">Open</option>
              <option value="In Progress">In Progress</option>
              <option value="Closed">Closed</option>
            </select>

            <input id="description" placeholder="Description" />

            <button id="saveBtn" class="btn-primary">Save Task</button>
          </div>
        </div>

        <!-- TABLE CARD -->
        <div class="card table-card">
          <section class="report-section">
            <h2>Active Layover Registry</h2>

            <div class="carousel-wrapper">
              <button class="glass-arrow left-arrow" id="arrowLeft">
                &#10094;
              </button>

              <div id="aircraftCarousel" class="aircraft-carousel"></div>

              <button class="glass-arrow right-arrow" id="arrowRight">
                &#10095;
              </button>
            </div>
          </section>
        </div>
      </div>
    </div>

    <div id="mobileOverlay" class="mobile-overlay hidden"></div>
    <!-- LOADER -->
    <div id="loadingOverlay" class="loading-overlay hidden">
      <div class="spinner-wrapper">
        <div class="spinner"></div>
        <p>Synchronizing operations...</p>
      </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast hidden"></div>

    <!-- CONFIRM MODAL -->
    <div id="confirmModal" class="modal hidden">
      <div class="modal-content">
        <h3>Confirm Deletion</h3>
        <p>Are you sure you want to delete this task?</p>
        <div class="modal-actions">
          <button id="cancelDelete" class="btn-secondary">Cancel</button>
          <button id="confirmDelete" class="btn-danger">Delete</button>
        </div>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
