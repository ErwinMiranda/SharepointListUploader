<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Layover Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="dashboard">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="logo">
          <h2>BM Production Planning and Control</h2>
          <div class="accent-line"></div>
        </div>

        <nav class="nav">
          <a href="#" class="nav-item active">
            <span class="nav-icon">📊</span>
            <span class="nav-text">Dashboard</span>
          </a>
          <a href="#" class="nav-item">
            <span class="nav-icon">📋</span>
            <span class="nav-text">Tasks</span>
          </a>
          <a href="#" class="nav-item">
            <span class="nav-icon">📈</span>
            <span class="nav-text">Reports</span>
          </a>
          <a href="#" class="nav-item">
            <span class="nav-icon">⚙️</span>
            <span class="nav-text">Settings</span>
          </a>
        </nav>
      </aside>

      <!-- MAIN AREA -->
      <div class="main">
        <!-- HEADER -->
        <header class="topbar">
          <div class="topbar-left">
            <button id="sidebarToggle" class="toggle-btn">☰</button>
            <h1>Layover Preparartion</h1>
          </div>
          <div class="user">Admin</div>
        </header>

        <!-- TABLE CARD -->
        <div class="card table-card">
          <section class="report-section">
            <div class="carousel-wrapper">
              <button class="carousel-btn left" id="prevBtn">‹</button>
              <div
                id="aircraftCarousel"
                class="aircraft-carousel"
                tabindex="0"
              ></div>
              <button class="carousel-btn right" id="nextBtn">›</button>
            </div>
          </section>
        </div>
      </div>
    </div>

    <div id="mobileOverlay" class="mobile-overlay hidden"></div>
    <!-- LOADER -->
    <div id="loadingOverlay" class="loading-overlay hidden">
      <div class="spinner-wrapper">
        <div class="spinner"></div>
        <p>Synchronizing operations...</p>
      </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast hidden"></div>

    <!-- CONFIRM MODAL -->
    <div id="confirmModal" class="modal hidden">
      <div class="modal-content">
        <h3>Confirm Deletion</h3>
        <p>Are you sure you want to delete this task?</p>
        <div class="modal-actions">
          <button id="cancelDelete" class="btn-secondary">Cancel</button>
          <button id="confirmDelete" class="btn-danger">Delete</button>
        </div>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
